name: Build Config Zip

on:
  push:
    branches:
      - main # 当 main 分支有更新时触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Zip, MD5 and Index
        run: |
          mkdir -p dist
          # 1. 打包完整的 zip 和 zip 的 md5 (用于全量下载)
          cd grade
          zip -r ../dist/config.zip ./*
          cd ../dist
          md5sum config.zip | awk '{print $1}' > md5.txt
          cd ..
          
          # 2. 生成单文件索引表 index.json (用于单体下载和单体 MD5 校验)
          python -c '
          import os, hashlib, json
          idx = {}
          for root, _, files in os.walk("grade"):
              for f in files:
                  path = os.path.join(root, f).replace("\\", "/")
                  with open(path, "rb") as file:
                      idx[path] = hashlib.md5(file.read()).hexdigest()
          with open("dist/index.json", "w") as out:
              json.dump(idx, out)
          '

      - name: Push to dist branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: dist # 推送到 dist 分支
          FOLDER: dist # 将 dist 文件夹里的内容推送上去
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}