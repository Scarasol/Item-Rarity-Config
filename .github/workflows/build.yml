name: Build Config Zip

on:
  push:
    branches:
      - main # 当 main 分支有更新时触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Zip and MD5
        run: |
          mkdir -p dist
          # 只打包 grade 文件夹内部的内容
          cd grade
          zip -r ../dist/config.zip ./*
          cd ../dist
          # 计算 MD5 并保存到 md5.txt
          md5sum config.zip | awk '{print $1}' > md5.txt

      - name: Push to dist branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: dist # 推送到 dist 分支
          FOLDER: dist # 将 dist 文件夹里的内容推送上去
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}